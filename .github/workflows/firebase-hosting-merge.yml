# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Debug - List Bindings
        run: ls node_modules/@oxc-parser/ || true
      - name: Generate Nuxt Types
        run: npx nuxi prepare
      - name: Check Generated Types
        run: |
          ls -la .nuxt/tsconfig.json || echo "Main tsconfig missing"
          ls -la .nuxt/tsconfig.app.json || echo "App tsconfig missing"
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Unit Tests
        run: npm run test
      - name: Build
        run: npm run build
      - name: Generate (SSG for Firebase)
        run: npm run generate
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MRS_PHILIPPINES_MONTREAL }}
          channelId: live
          projectId: mrs-philippines-montreal
